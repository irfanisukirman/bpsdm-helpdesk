<style>
  :root{
    --accent:#16653c; --accent-ink:#0f4a2c; --accent-soft:#e3efe6;
    --bg:#eef1ed; --panel:#ffffff; --line:#d9e0d6; --muted:#5c6b60;
  }
  body{background:var(--bg); color:#1b241f; font-size:14px}
  .text-muted-2{color:var(--muted)}
  .app-nav{
    background:var(--panel); border-bottom:1px solid var(--line);
    display:flex; justify-content:space-between; align-items:center; min-height:56px;
  }
  .brand-mark{
    width:34px; height:34px; border-radius:8px; display:grid; place-items:center;
    color:#fff; font-weight:800; font-size:13px;
    background:linear-gradient(150deg,var(--accent),var(--accent-ink));
  }
  .badge-soft{background:var(--accent-soft); color:var(--accent-ink); font-weight:600}

  .workspace{display:grid; grid-template-columns:minmax(340px,400px) 1fr; height:calc(100vh - 57px)}
  @media (max-width:880px){ .workspace{grid-template-columns:1fr; height:auto} }

  .form-pane{overflow-y:auto; padding:16px 16px 60px; background:#f6f9f4; border-right:1px solid var(--line)}
  .grp{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:13px 14px; margin-bottom:12px}
  .grp-title{
    display:flex; align-items:center; gap:8px; font-size:12px; font-weight:700;
    letter-spacing:.5px; text-transform:uppercase; color:var(--muted); margin-bottom:10px;
  }
  .grp-title .n{
    width:19px; height:19px; border-radius:6px; font-size:11px; display:grid; place-items:center;
    background:var(--accent-soft); color:var(--accent-ink); border:1px solid rgba(22,101,60,.2);
  }
  .form-label{font-size:12px; font-weight:600; margin-bottom:3px; color:#1b241f}
  .opt{font-weight:500; color:var(--muted); text-transform:none; letter-spacing:0}
  .form-control,.form-select{font-size:13px}
  .form-control:focus,.form-select:focus{border-color:var(--accent); box-shadow:0 0 0 .2rem rgba(22,101,60,.15)}
  .hint{font-size:11.5px; color:var(--muted); margin-top:4px}
  .ref-toggle{font-size:12px!important; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--muted)!important; box-shadow:none!important}
  .ref-toggle::after{margin-left:6px}

  .emp-list{display:flex; flex-direction:column; gap:6px}
  .emp{
    display:flex; align-items:center; gap:9px; padding:7px 9px; border:1px solid var(--line);
    border-radius:8px; cursor:pointer; background:#fff;
  }
  .emp:hover{border-color:rgba(22,101,60,.4)}
  .emp.on{border-color:var(--accent); background:var(--accent-soft)}
  .emp input{accent-color:var(--accent); width:15px; height:15px; flex:none}
  .emp .en{font-size:12.5px; font-weight:600; line-height:1.25}
  .emp .em{font-size:11px; color:var(--muted)}
  .emp .ord{margin-left:auto; font-size:11px; min-width:22px; text-align:center; color:var(--accent-ink);
    background:#fff; border:1px solid var(--line); border-radius:6px; padding:0 6px}

  .preview-pane{display:flex; flex-direction:column; overflow:hidden}
  .preview-bar{display:flex; align-items:center; gap:8px; padding:10px 14px; border-bottom:1px solid var(--line); background:#f6f9f4}
  .nav-pills .nav-link{color:var(--muted); font-size:13px; font-weight:600; padding:5px 12px}
  .nav-pills .nav-link.active{background:var(--accent)}
  .paper-wrap{flex:1; background:#d7ddd4; overflow:hidden}
  #preview{width:100%; height:100%; border:0; background:#d7ddd4}
  .result{padding:11px 14px; font-size:13px; border-bottom:1px solid var(--line); background:#fff}
  .result a{color:var(--accent-ink); font-weight:600}
</style>
